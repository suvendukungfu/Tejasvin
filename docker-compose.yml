version: '3.8'

services:
  # 🍃 MongoDB Database
  mongo:
    image: mongo:latest
    container_name: tejasvin_mongo
    restart: always
    ports:
      - "27017:27017" # Default Mongo IP
    volumes:
      - mongo_data:/data/db
    networks:
      - rescue_net

  # ⚡ Redis (For Socket.io Scaling & Caching)
  redis:
    image: redis:alpine
    container_name: tejasvin_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    networks:
      - rescue_net

  # 📊 Mongo Express (Web UI for Database)
  mongo-express:
    image: mongo-express
    container_name: tejasvin_mongo_viewer
    restart: always
    ports:
      - "8081:8081" # Access at http://localhost:8081
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_MONGODB_PORT: 27017
    depends_on:
      - mongo
    networks:
      - rescue_net

volumes:
  mongo_data:

networks:
  rescue_net:
    driver: bridge
